name: Release to PyPI

# This tells GitHub to ONLY run this when you publish a Release on GitHub
on:
  release:
    types: [published]

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Notice we only kept the modern 64-bit systems!
        target: [x86_64, aarch64]
        os: [ubuntu-latest, windows-latest, macos-14]
        exclude:
          - os: windows-latest
            target: aarch64
          - os: ubuntu-latest
            target: aarch64

    steps:
      - uses: actions/checkout@v4
      
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          # This tells it to build for Python 3.8 and up using our abi3 setup
          sccache: 'true'
          
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  # The final step: Uploading to PyPI
  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels]
    environment: pypi
    permissions:
      # IMPORTANT: This permission is required for Trusted Publishing!
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
          
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
